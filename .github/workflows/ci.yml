name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, tests, build, and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COMPOSE_PROJECT_NAME: cpa-ci-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify packages
        run: npm run verify

      - name: Regenerate reference docs
        run: npm run docs:reference

      - name: Check generated reference docs
        run: git diff --exit-code docs/reference/sdk

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Lint Helm chart
        run: |
          helm lint deploy/helm/clickhouse-product-analytics \
            --set ingest.publicApiKeys=local_dev_key \
            --set clickhouse.url=http://clickhouse:8123 \
            --set clickhouse.user=analytics \
            --set clickhouse.password=local_dev_password

      - name: Render Helm chart
        run: |
          helm template cpa deploy/helm/clickhouse-product-analytics \
            --set ingest.publicApiKeys=local_dev_key \
            --set clickhouse.url=http://clickhouse:8123 \
            --set clickhouse.user=analytics \
            --set clickhouse.password=local_dev_password

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Start E2E stack
        run: docker compose up -d --build

      - name: Show E2E stack status
        run: docker compose ps

      - name: Run E2E tests
        run: npm run verify:e2e
        env:
          CPA_SERVICE_URL: http://127.0.0.1:8080
          CPA_API_KEY: local_dev_key
          CLICKHOUSE_URL: http://127.0.0.1:8123
          CLICKHOUSE_USER: analytics
          CLICKHOUSE_PASSWORD: local_dev_password
          CLICKHOUSE_DATABASE: product_analytics

      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs --no-color --timestamps

      - name: Stop E2E stack
        if: always()
        run: docker compose down -v --remove-orphans
