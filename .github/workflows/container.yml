name: Publish Container

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/ingest-service

jobs:
  build-and-publish:
    name: Build and publish ingest image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify current main commit
        run: |
          git fetch origin main --depth=1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'workflow_run' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'workflow_run' }}

      - name: Build and publish
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/ingest-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published platforms
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}@${{ steps.build.outputs.digest }}" | tee manifest.txt
          grep -q 'Platform:.*linux/amd64' manifest.txt
          grep -q 'Platform:.*linux/arm64' manifest.txt
