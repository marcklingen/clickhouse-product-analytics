apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clickhouse-product-analytics.fullname" . }}
  labels:
    {{- include "clickhouse-product-analytics.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.ingest.port | quote }}
  LOG_LEVEL: {{ .Values.ingest.logLevel | quote }}
  ALLOWED_ORIGINS: {{ .Values.ingest.allowedOrigins | quote }}
  ALLOWED_HOSTS: {{ .Values.ingest.allowedHosts | quote }}
  MAX_BATCH_BYTES: {{ .Values.ingest.maxBatchBytes | quote }}
  MAX_EVENTS_PER_BATCH: {{ .Values.ingest.maxEventsPerBatch | quote }}
  CLICKHOUSE_URL: {{ required "clickhouse.url is required" .Values.clickhouse.url | quote }}
  CLICKHOUSE_DATABASE: {{ .Values.clickhouse.database | quote }}
  MIGRATE_ON_START: {{ .Values.ingest.migrateOnStart | quote }}
